name: Deploy landing to GitHub Pages

# Publishes the self-contained marketing site in landing/ to GitHub Pages.
# Edits to landing/index.html on main auto-deploy. The ops code and the
# kanban-and-docs branch are untouched — only landing/ is published.

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload landing/ as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
