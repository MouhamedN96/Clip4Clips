version: '3.8'

services:
  # Main API Server
  clipforge-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: clipforge-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - config/.env
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - clipforge-data:/app/data
    depends_on:
      - postgres
      - redis
    networks:
      - clipforge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Background Worker
  # NOTE: no container_name here — it conflicts with replicas. On a €20 box
  # (shared vCPU, 8GB) one worker is plenty; scale up once volume justifies it.
  clipforge-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    env_file:
      - config/.env
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - clipforge-data:/app/data
    depends_on:
      - postgres
      - redis
    networks:
      - clipforge-network
    deploy:
      replicas: 1

  # Scheduler (Cron Jobs)
  clipforge-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.scheduler
    container_name: clipforge-scheduler
    restart: unless-stopped
    env_file:
      - config/.env
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - clipforge-data:/app/data
    networks:
      - clipforge-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: clipforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clipforge
      POSTGRES_USER: clipforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - clipforge-postgres-data:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - clipforge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipforge -d clipforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: clipforge-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - clipforge-redis-data:/data
    networks:
      - clipforge-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: clipforge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - clipforge-api
    networks:
      - clipforge-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  clipforge-network:
    driver: bridge

volumes:
  clipforge-postgres-data:
  clipforge-redis-data:
  clipforge-data:
